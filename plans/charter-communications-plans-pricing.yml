specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Charter Communications
providerId: charter-communications
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Telecommunications
  - Broadband
  - Cable
  - CAMARA
description: Charter Communications (Spectrum) exposes APIs through the Spectrum Enterprise portal (ticketing,
  serviceability) and the Bryte IQ Network-as-a-Service platform built on the Linux Foundation CAMARA
  project. API access is partner-gated and bundled with the underlying Spectrum Enterprise / Bryte IQ
  service contracts; no public per-call price list is published.
notes: No public API price list. Pricing is contractually bundled with Spectrum Enterprise services.
sources:
  - https://enterprise.spectrum.com/
  - https://www.brytenetwork.com/
plans:
  - id: charter-communications-spectrum-enterprise
    name: Spectrum Enterprise API Access
    type: enterprise
    description: REST APIs for service ticketing and serviceability for Spectrum Enterprise customers
      and channel partners. Provided as part of the enterprise service contract.
    entries:
      - label: Enterprise integration
        name: enterprise_integration
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: contract
        userMultiplied: false
    elements:
      - name: Service ticketing API
      - name: Carrier serviceability API
      - name: OAuth 2.0 authentication
  - id: charter-communications-bryte-iq
    name: Bryte IQ NaaS
    type: enterprise
    description: Network-as-a-Service platform exposing CAMARA-aligned APIs for programmable connectivity.
      Pricing follows the Bryte IQ commercial model (contracted bandwidth / NaaS subscription).
    entries:
      - label: Bryte IQ subscription
        name: naas_subscription
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: contract
        userMultiplied: false
    elements:
      - name: CAMARA Quality-on-Demand and Connectivity APIs
      - name: Programmable bandwidth
      - name: NaaS billing
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
