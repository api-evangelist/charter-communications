extends:
  - spectral:oas
rules:
  charter-https-only:
    description: All servers must use HTTPS.
    severity: error
    given: $.servers[*].url
    then:
      function: pattern
      functionOptions:
        match: '^https://'
  charter-info-contact:
    description: API definitions must declare contact information.
    severity: error
    given: $.info
    then:
      field: contact
      function: truthy
  charter-oauth-required:
    description: Spectrum Enterprise APIs must declare OAuth 2.0 security.
    severity: warn
    given: $.components.securitySchemes
    then:
      function: truthy
  charter-operation-tags:
    description: Operations must declare at least one tag.
    severity: warn
    given: $.paths[*][get,post,put,delete,patch]
    then:
      field: tags
      function: truthy
  charter-camara-naming:
    description: Bryte IQ NaaS endpoints should align with CAMARA naming conventions.
    severity: info
    given: $.info.title
    then:
      function: truthy
