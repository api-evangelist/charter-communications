naftiko: 1.0.0-alpha2
info:
  label: Charter Communications Bryte IQ API — Network
  description: 'Charter Communications Bryte IQ API — Network. 1 operations. Lead operation: Get Network Status. Self-contained
    Naftiko capability covering one Charter Communications business surface.'
  tags:
  - Charter Communications
  - Network
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHARTER_COMMUNICATIONS_API_KEY: CHARTER_COMMUNICATIONS_API_KEY
capability:
  consumes:
  - type: http
    namespace: bryte-iq-network
    baseUri: https://api.charter.com
    description: Charter Communications Bryte IQ API — Network business capability. Self-contained, no shared references.
    resources:
    - name: network-status
      path: /network/status
      operations:
      - name: getnetworkstatus
        method: GET
        description: Get Network Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: bryte-iq-network-rest
    port: 8080
    description: REST adapter for Charter Communications Bryte IQ API — Network. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/network/status
      name: network-status
      description: REST surface for network-status.
      operations:
      - method: GET
        name: getnetworkstatus
        description: Get Network Status
        call: bryte-iq-network.getnetworkstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bryte-iq-network-mcp
    port: 9090
    transport: http
    description: MCP adapter for Charter Communications Bryte IQ API — Network. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-network-status
      description: Get Network Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bryte-iq-network.getnetworkstatus
      outputParameters:
      - type: object
        mapping: $.
