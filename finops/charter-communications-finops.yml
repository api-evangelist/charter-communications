specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Charter Communications
providerId: charter-communications
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Telecommunications
  - Broadband
description: 'FOCUS-aligned FinOps framing for Charter Communications: enterprise telecom and NaaS services
  billed by contract; API access bundled with Spectrum Enterprise / Bryte IQ service charges rather
  than separately metered.'
notes: API consumption is not separately priced. Meters reflect bundled telecom / NaaS billing surface.
sources:
  - https://enterprise.spectrum.com/
  - https://www.brytenetwork.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Charter Communications, Inc.
serviceCategory: Telecommunications / Broadband
billingModel:
  pricingCategory: Subscription + Usage (Contract)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Spectrum Enterprise / Bryte IQ
  ServiceCategory: Telecommunications
  ProviderName: Charter Communications
  PublisherName: Charter Communications, Inc.
  InvoiceIssuerName: Charter Communications, Inc.
  BillingCurrency: USD
meters:
  - name: connectivity_circuits
    unit: circuit-month
    aggregation: sum
    dimensions:
      - service
      - location
  - name: bandwidth_committed
    unit: Mbps-month
    aggregation: max
    dimensions:
      - service
      - location
  - name: naas_qod_sessions
    unit: session
    aggregation: sum
  - name: managed_services
    unit: service-month
    aggregation: sum
principles:
  - name: Visibility
    description: Use the Spectrum Enterprise customer portal and Bryte IQ usage reports for invoice and
      service inventory data.
  - name: Allocation
    description: Allocate by site / circuit ID / NaaS subscription; tag in CMDB for chargeback.
  - name: Optimization
    description: Right-size committed bandwidth, exercise NaaS dynamic capacity for bursty workloads,
      and consolidate sites at strategic POPs.
  - name: Accountability
    description: Telecom / network team owns Charter invoices; review monthly against forecast and SLA
      credits.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
