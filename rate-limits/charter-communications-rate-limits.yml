specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Charter Communications
providerId: charter-communications
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Telecommunications
  - Broadband
description: Charter (Spectrum / Bryte IQ) does not publish numeric API rate limits. API access is gated
  per partner / customer contract; throttling and quotas are governed by the onboarding configuration
  and CAMARA / NaaS commercial terms.
notes: No public per-second/per-minute numbers documented; contract-governed.
sources:
  - https://enterprise.spectrum.com/
  - https://www.brytenetwork.com/
responseCodes:
  throttled: 429
  unauthorized: 401
limits:
  - name: Spectrum Enterprise APIs
    scope: api_key
    metric: varies
    limit: see partner agreement
  - name: Bryte IQ NaaS APIs
    scope: contract
    metric: varies
    limit: see NaaS service contract
policies:
  - name: Backoff Strategy
    description: Use exponential backoff with jitter on 429/503; honor Retry-After headers when present.
  - name: OAuth 2.0
    description: APIs require OAuth 2.0 client credentials issued during onboarding; tokens scoped to
      enabled APIs.
  - name: CAMARA conformance
    description: Bryte IQ APIs follow CAMARA project semantics; consumers should reference CAMARA error
      and retry conventions.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
