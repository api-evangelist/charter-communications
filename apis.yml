aid: charter-communications
name: Charter Communications
description: >-
  Charter Communications, Inc. is a leading broadband connectivity company and
  cable operator serving more than 32 million customers in 41 states through its
  Spectrum brand. Charter offers internet, TV, mobile, and voice services to
  residential and business customers, and exposes developer APIs through the
  Spectrum Enterprise portal for service ticketing and carrier serviceability,
  and through the Bryte IQ Network-as-a-Service platform built on the Linux
  Foundation CAMARA project.
