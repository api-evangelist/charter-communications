  - aid: charter-communications:bryte-iq-api
    name: Charter Communications Bryte IQ API
    tags:
      - CAMARA
      - NaaS
      - Network as a Service
      - Telecommunications
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
